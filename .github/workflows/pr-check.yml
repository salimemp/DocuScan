# DocScan Pro - Pull Request Checks
# Quick validation for pull requests

name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # ============================================
  # Quick Validation
  # ============================================
  validate:
    name: Validate PR
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit messages
        run: |
          echo "Checking commit message format..."
          # Add commit message validation if needed

      - name: Check for merge conflicts
        run: |
          git fetch origin ${{ github.base_ref }}
          if git merge-tree $(git merge-base HEAD origin/${{ github.base_ref }}) HEAD origin/${{ github.base_ref }} | grep -q '^<<<<<<<'; then
            echo "❌ Merge conflicts detected"
            exit 1
          fi
          echo "✅ No merge conflicts"

  # ============================================
  # Frontend Quick Check
  # ============================================
  frontend-check:
    name: Frontend Quick Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Check for console.log statements
        run: |
          if grep -r "console.log" --include="*.ts" --include="*.tsx" app/ components/ hooks/ 2>/dev/null | grep -v "// DEBUG" | head -5; then
            echo "⚠️ Found console.log statements (consider removing before merge)"
          fi

  # ============================================
  # Backend Quick Check
  # ============================================
  backend-check:
    name: Backend Quick Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Syntax check
        run: python -m py_compile server.py auth.py subscriptions.py

      - name: Quick lint
        run: ruff check . --select=E,F --ignore=E501 || true

  # ============================================
  # PR Summary
  # ============================================
  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [validate, frontend-check, backend-check]
    if: always()
    
    steps:
      - name: Create summary
        run: |
          echo "## Pull Request Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Validation | ${{ needs.validate.result == 'success' && '✅' || '❌' }} ${{ needs.validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.frontend-check.result == 'success' && '✅' || '❌' }} ${{ needs.frontend-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.backend-check.result == 'success' && '✅' || '❌' }} ${{ needs.backend-check.result }} |" >> $GITHUB_STEP_SUMMARY
