# DocScan Pro - Pull Request Checks
# Quick validation for pull requests

name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # ============================================
  # Frontend Quick Check
  # ============================================
  frontend-check:
    name: Frontend Quick Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: TypeScript check
        run: npx tsc --noEmit || echo "Type check completed"
        continue-on-error: true

  # ============================================
  # Backend Quick Check
  # ============================================
  backend-check:
    name: Backend Quick Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Syntax check
        run: python -m py_compile server.py auth.py subscriptions.py

      - name: Install linter
        run: pip install ruff

      - name: Quick lint
        run: ruff check . --select=E,F --ignore=E501 || echo "Lint completed"
        continue-on-error: true

  # ============================================
  # PR Summary
  # ============================================
  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [frontend-check, backend-check]
    if: always()
    
    steps:
      - name: Create summary
        run: |
          echo "## Pull Request Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.frontend-check.result == 'success' && '✅' || '⚠️' }} ${{ needs.frontend-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.backend-check.result == 'success' && '✅' || '⚠️' }} ${{ needs.backend-check.result }} |" >> $GITHUB_STEP_SUMMARY
