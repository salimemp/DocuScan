# DocScan Pro - Pull Request Checks
# Quick validation for pull requests

name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # ============================================
  # Validate Code
  # ============================================
  validate:
    name: Validate
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check backend syntax
        run: |
          cd backend
          python -m py_compile server.py auth.py subscriptions.py
          echo "✅ Backend syntax OK"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Check frontend dependencies
        run: |
          cd frontend
          yarn install --frozen-lockfile || yarn install
          echo "✅ Frontend dependencies OK"

  # ============================================
  # Summary
  # ============================================
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: validate
    if: always()
    
    steps:
      - name: Create summary
        run: |
          echo "## PR Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Validation | ${{ needs.validate.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
